apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Namespace for all resources
namespace: maintenance

# Resources to include
resources:
  - namespace.yaml
  - serviceaccount.yaml
  - configmap.yaml
  - secret.yaml
  - deployment.yaml
  - service.yaml
  - ingress.yaml

# Common labels applied to all resources
commonLabels:
  app: maintenance

# Common annotations applied to all resources
commonAnnotations:
  managed-by: kustomize
  environment: production

# Images to manage - must match the image reference in deployment.yaml
images:
  - name: maintenance-page
    newName: 027265528423.dkr.ecr.us-east-1.amazonaws.com/maintenance-page
    newTag: latest
