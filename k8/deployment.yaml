apiVersion: apps/v1
kind: Deployment
metadata:
  name: maintenance-page
  namespace: maintenance
  labels:
    app: maintenance-page
    component: web
    environment: prod

spec:
  replicas: 1

  selector:
    matchLabels:
      app: maintenance

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0

  template:
    metadata:
      labels:
        app: maintenance
        component: web
        environment: prod

    spec:
      serviceAccountName: maintenance-page
      containers:
        - name: maintenance-page
          image: 027265528423.dkr.ecr.us-east-1.amazonaws.com/maintenance-page:latest
          imagePullPolicy: Always

          ports:
            - name: http
              containerPort: 80
              protocol: TCP

          envFrom:
            - configMapRef:
                name: maintenance-page-config
            - secretRef:
                name: maintenance-page-secret

          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi

          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 2

          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 2
            failureThreshold: 3

      restartPolicy: Always