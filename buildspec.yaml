version: 0.2
env:
  variables:
    AWS_REGION: us-east-1
    AWS_ACCOUNT_ID: "027265528423"
    ECR_REPOSITORY: "027265528423.dkr.ecr.us-east-1.amazonaws.com/maintenance-page"
    IMAGE_REPO_NAME: "maintenance-page"
    CLUSTER_NAME: "demo-cluster"
    K8S_NAMESPACE: "maintenance"
    DEPLOYMENT_NAME: "maintenance-page"
    CONTAINER_NAME: "maintenance-page"
    DOMAIN: "page.tledtech.com"
phases:
  install:
    commands:
      - echo "Installing kubectl and eksctl"
      - curl -sSL --fail -o /usr/local/bin/kubectl https://dl.k8s.io/release/v1.24.10/bin/linux/amd64/kubectl
      - chmod +x /usr/local/bin/kubectl
      - curl --silent --location "https://github.com/weaveworks/eksctl/releases/latest/download/eksctl_$(uname -s)_amd64.tar.gz" | tar xz -C /tmp
      - mv /tmp/eksctl /usr/local/bin/
  pre_build:
    commands:
      - echo "Logging in to Amazon ECR"
      - aws ecr get-login-password --region "$AWS_REGION" | docker login --username AWS --password-stdin "${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com"
      - export IMAGE_TAG_SHA=${CODEBUILD_RESOLVED_SOURCE_VERSION:0:8}
      - export IMAGE_TAG_LATEST=latest
  build:
    commands:
      - echo "Building Docker image"
      - docker build -t "${IMAGE_REPO_NAME}:${IMAGE_TAG_SHA}" -t "${IMAGE_REPO_NAME}:${IMAGE_TAG_LATEST}" .
      - docker tag "${IMAGE_REPO_NAME}:${IMAGE_TAG_SHA}" "${ECR_REPOSITORY}:${IMAGE_TAG_SHA}"
      - docker tag "${IMAGE_REPO_NAME}:${IMAGE_TAG_LATEST}" "${ECR_REPOSITORY}:${IMAGE_TAG_LATEST}"
  post_build:
    commands:
      - echo "Pushing images to ECR"
      - docker push "${ECR_REPOSITORY}:${IMAGE_TAG_SHA}"
      - docker push "${ECR_REPOSITORY}:${IMAGE_TAG_LATEST}"
      - printf '[{"name":"%s","imageUri":"%s:%s"}]' "${CONTAINER_NAME}" "${ECR_REPOSITORY}" "${IMAGE_TAG_SHA}" > imagedefinitions.json
      - aws eks update-kubeconfig --region "$AWS_REGION" --name "$CLUSTER_NAME"
      - kubectl apply -k k8/
      - kubectl -n "${K8S_NAMESPACE}" set image "deployment/${DEPLOYMENT_NAME}" "${CONTAINER_NAME}=${ECR_REPOSITORY}:${IMAGE_TAG_SHA}"
      - kubectl -n "${K8S_NAMESPACE}" rollout status "deployment/${DEPLOYMENT_NAME}" --timeout=300s
artifacts:
  files:
    - imagedefinitions.json
