version: 0.2
env:
  variables:
    AWS_REGION: us-east-1
    AWS_ACCOUNT_ID: "027265528423"
    ECR_REPOSITORY: "027265528423.dkr.ecr.us-east-1.amazonaws.com/maintenance-page"
    IMAGE_REPO_NAME: "maintenance-page"
    CLUSTER_NAME: "demo-cluster"
    K8S_NAMESPACE: "maintenance"
    DEPLOYMENT_NAME: "maintenance-page"
    CONTAINER_NAME: "maintenance-page"
    DOMAIN: "page.tledtech.com"
phases:
  install:
    commands:
      - echo "Installing kubectl eksctl kustomize"
      - |
        if ! command -v kubectl >/dev/null 2>&1; then
          curl -sSL --fail -o kubectl https://s3.us-west-2.amazonaws.com/amazon-eks/1.24.10/2023-10-03/bin/linux/amd64/kubectl
          chmod +x kubectl
          mv kubectl /usr/local/bin/
        fi
      - |
        if ! command -v eksctl >/dev/null 2>&1; then
          curl --silent --location "https://github.com/weaveworks/eksctl/releases/latest/download/eksctl_$(uname -s)_amd64.tar.gz" | tar xz -C /tmp
          mv /tmp/eksctl /usr/local/bin/
        fi
      - |
        if ! command -v kustomize >/dev/null 2>&1; then
          KUST_VER=v5.0.0
          echo "Downloading kustomize ${KUST_VER}..."
          curl -fsSL -o kustomize.tar.gz "https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize/${KUST_VER}/kustomize_${KUST_VER}_linux_amd64.tar.gz" || true
          if [ -f kustomize.tar.gz ]; then
            tar -xzf kustomize.tar.gz || (echo "tar extract failed" >&2; exit 1)
          else
            curl -fsSL -o kustomize.bin "https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize/${KUST_VER}/kustomize_${KUST_VER}_linux_amd64" || true
          fi
          if [ -f kustomize ]; then
            chmod +x kustomize
            mv kustomize /usr/local/bin/
          elif [ -f kustomize.bin ]; then
            chmod +x kustomize.bin
            mv kustomize.bin /usr/local/bin/kustomize
          else
            echo "kustomize download failed" >&2
            exit 1
          fi
        fi
  pre_build:
    commands:
      - echo "Logging in to Amazon ECR"
      - echo "Debug: STS identity"
      - aws sts get-caller-identity || true
      - echo "Debug: try to get ECR authorization token (will show permission error if any)"
      - aws ecr get-authorization-token --region "$AWS_REGION" || true
      - aws ecr get-login-password --region "$AWS_REGION" | docker login --username AWS --password-stdin "${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com"
      - export IMAGE_TAG_SHA=${CODEBUILD_RESOLVED_SOURCE_VERSION:0:8}
      - export IMAGE_TAG_LATEST=latest
  build:
    commands:
      - echo "Building Docker image"
      - docker build -t "${IMAGE_REPO_NAME}:${IMAGE_TAG_SHA}" -t "${IMAGE_REPO_NAME}:${IMAGE_TAG_LATEST}" .
      - docker tag "${IMAGE_REPO_NAME}:${IMAGE_TAG_SHA}" "${ECR_REPOSITORY}:${IMAGE_TAG_SHA}"
      - docker tag "${IMAGE_REPO_NAME}:${IMAGE_TAG_LATEST}" "${ECR_REPOSITORY}:${IMAGE_TAG_LATEST}"
  post_build:
    commands:
      - echo "Pushing images to ECR"
      - docker push "${ECR_REPOSITORY}:${IMAGE_TAG_SHA}"
      - docker push "${ECR_REPOSITORY}:${IMAGE_TAG_LATEST}"
      - printf '[{"name":"%s","imageUri":"%s:%s"}]' "${CONTAINER_NAME}" "${ECR_REPOSITORY}" "${IMAGE_TAG_SHA}" > imagedefinitions.json
      - aws eks update-kubeconfig --region "$AWS_REGION" --name "$CLUSTER_NAME"
      - kubectl apply -k k8/
      - kubectl -n "${K8S_NAMESPACE}" set image "deployment/${DEPLOYMENT_NAME}" "${CONTAINER_NAME}=${ECR_REPOSITORY}:${IMAGE_TAG_SHA}"
      - kubectl -n "${K8S_NAMESPACE}" rollout status "deployment/${DEPLOYMENT_NAME}" --timeout=300s
artifacts:
  files:
    - imagedefinitions.json
